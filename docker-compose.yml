version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-webserver:
    build: .
    container_name: airflow-webserver
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow/src
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    entrypoint: /opt/airflow/scripts/entrypoint.sh

  airflow-scheduler:
    build: .
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - airflow-webserver
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - PYTHONPATH=/opt/airflow/src
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    command: scheduler
    entrypoint: /opt/airflow/scripts/entrypoint.sh

  nyc-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nyc-api
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./api:/app/api
    ports:
      - "8000:8000"
  
  nyc-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: nyc-dashboard
    environment:
      - REACT_APP_API_URL=http://nyc-api:8000/graphql
    ports:
      - "3000:3000"
    depends_on:
      - nyc-api

volumes:
  postgres_data: